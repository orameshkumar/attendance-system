<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // Redirect to index.html, encoding the path as a query param
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var redirect = window.location.origin +
        '/attendance-system/?p=' + encodeURIComponent(path.replace('/attendance-system', '') + search) + hash;
      window.location.replace(redirect);
    </script>
  </head>
  <body></body>
</html>
